# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Deploy to WordPress.org

on:
    release:
        types: [published]

jobs:
    # ─────────────────────────────────────────────
    # JOB 1: PHPCS
    # ─────────────────────────────────────────────
    phpcs:
        name: PHPCS
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "7.4"
                  tools: composer
                  coverage: none

            - name: Install Composer dependencies
              run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

            - name: Run PHPCS
              run: composer run test:phpcs

    # ─────────────────────────────────────────────
    # JOB 2: PHPStan
    # ─────────────────────────────────────────────
    phpstan:
        name: PHPStan
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.2"
                  tools: composer
                  coverage: none

            - name: Install Composer dependencies
              run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

            - name: Run PHPStan
              run: composer run test:phpstan

    # ─────────────────────────────────────────────
    # JOB 3: ESLint + Stylelint
    # ─────────────────────────────────────────────
    js:
        name: ESLint + Stylelint
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Node dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint:js

            - name: Run Stylelint
              run: npm run lint:css

    # ─────────────────────────────────────────────
    # JOB 4: Deploy to WordPress.org
    # ─────────────────────────────────────────────
    deploy:
        name: WordPress.org Deploy
        needs: [phpcs, phpstan, js]
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment:
            name: WordPress.org
            url: https://wordpress.org/plugins/menupilot/

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "7.4"
                  tools: composer
                  coverage: none

            - name: Install Node dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Install Composer dependencies (production)
              run: composer install --no-dev --no-interaction --prefer-dist

            - name: WordPress Plugin Deploy
              id: deploy
              uses: 10up/action-wordpress-plugin-deploy@2.2.2
              with:
                  generate-zip: true
              env:
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

            - name: Upload ZIP artifact
              uses: actions/upload-artifact@v4
              with:
                  name: menupilot
                  path: ${{ steps.deploy.outputs.zip-path }}
                  retention-days: 30

    # ─────────────────────────────────────────────
    # JOB 5: Slack Notification
    # ─────────────────────────────────────────────
    notify:
        name: Slack Notification
        needs: deploy
        runs-on: ubuntu-latest
        if: always()
        continue-on-error: true

        steps:
            - name: Checkout (full history)
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Build Slack payload
              env:
                  CURRENT_TAG: ${{ github.ref_name }}
                  ACTOR: ${{ github.actor }}
                  REPO: ${{ github.repository }}
                  DEPLOY_STATUS: ${{ needs.deploy.result }}
              run: |
                  PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
                  RELEASE_URL="https://github.com/${REPO}/releases/tag/${CURRENT_TAG}"

                  if [ -z "$PREV_TAG" ]; then
                    COMPARE_URL="$RELEASE_URL"
                  else
                    COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...${CURRENT_TAG}"
                  fi

                  if [ -z "$PREV_TAG" ]; then
                    RAW=$(git log --pretty=format:"%s|%h" -10)
                  else
                    RAW=$(git log --pretty=format:"%s|%h" "${PREV_TAG}..${CURRENT_TAG}")
                  fi

                  CHANGES=""
                  while IFS='|' read -r msg sha; do
                    [ -z "$msg" ] && continue
                    CHANGES="${CHANGES}• ${msg} (<https://github.com/${REPO}/commit/${sha}|${sha}>)"$'\n'
                  done <<< "$RAW"
                  CHANGES="${CHANGES%$'\n'}"

                  if [ "$DEPLOY_STATUS" = "success" ]; then
                    HEADER="✅ MenuPilot ${CURRENT_TAG} — Deployed to WordPress.org"
                  elif [ "$DEPLOY_STATUS" = "skipped" ]; then
                    HEADER="⚠️ MenuPilot ${CURRENT_TAG} — Deploy skipped (CI checks failed)"
                  else
                    HEADER="❌ MenuPilot ${CURRENT_TAG} — Deployment failed"
                  fi

                  jq -n \
                    --arg header      "$HEADER" \
                    --arg actor       "$ACTOR" \
                    --arg changes     "$CHANGES" \
                    --arg release_url "$RELEASE_URL" \
                    --arg compare_url "$COMPARE_URL" \
                    --arg wporg_url   "https://wordpress.org/plugins/menupilot/" \
                    '{
                      blocks: [
                        {
                          type: "header",
                          text: { type: "plain_text", text: $header, emoji: true }
                        },
                        {
                          type: "section",
                          fields: [
                            { type: "mrkdwn", text: ("*Released by:* `" + $actor + "`") }
                          ]
                        },
                        {
                          type: "section",
                          text: { type: "mrkdwn", text: ("*Changes:*\n" + $changes) }
                        },
                        {
                          type: "actions",
                          elements: [
                            { type: "button", text: { type: "plain_text", text: "🔗 View Release", emoji: true }, url: $release_url },
                            { type: "button", text: { type: "plain_text", text: "📋 View Changes", emoji: true }, url: $compare_url },
                            { type: "button", text: { type: "plain_text", text: "🔌 WordPress.org", emoji: true }, url: $wporg_url }
                          ]
                        }
                      ]
                    }' > /tmp/slack-payload.json

            - name: Send Slack notification
              run: |
                  curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
                    -H "Content-Type: application/json" \
                    --fail \
                    -d @/tmp/slack-payload.json
